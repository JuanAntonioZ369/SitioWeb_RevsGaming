<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cancel Subscription — RevsGaming</title>
  <script>if(localStorage.getItem('revsgaming-theme')==='light')document.documentElement.classList.add('light-mode')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/i18n.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0d1117;
      --bg-card:    #16202d;
      --bg-panel:   #1e2d3d;
      --green:      #7EC8A0;
      --red:        #C47E7E;
      --accent:     #66c0f4;
      --text:       #c6d4df;
      --text-muted: #8f98a0;
      --border:     rgba(102,192,244,0.15);
      --glass:      rgba(22,32,45,0.9);
    }
    html.light-mode {
      --bg-deep:    #f5f7fa;
      --bg-card:    #ffffff;
      --bg-panel:   #f0f4f8;
      --green:      #2e7d50;
      --red:        #b03a3a;
      --accent:     #1565a8;
      --text:       #1a2332;
      --text-muted: #546678;
      --border:     rgba(20,40,80,0.1);
      --glass:      rgba(255,255,255,0.95);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 460px;
      width: 100%;
    }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: rgba(196,126,126,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .card-icon svg { color: var(--red); }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .info-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 24px;
      font-size: 0.875rem;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0;
    }
    .info-label { color: var(--text-muted); }
    .info-value { color: var(--text); font-weight: 600; text-align: right; }

    .warning-box {
      background: rgba(196,126,126,0.08);
      border: 1px solid rgba(196,126,126,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.83rem;
      color: var(--red);
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .success-box {
      background: rgba(126,200,160,0.08);
      border: 1px solid rgba(126,200,160,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: var(--green);
      line-height: 1.55;
      margin-bottom: 24px;
      display: none;
    }

    .alert-error {
      background: rgba(196,126,126,0.1);
      border: 1px solid rgba(196,126,126,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }
    .alert-error.visible { display: block; }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    .btn-cancel {
      width: 100%;
      padding: 13px;
      background: rgba(196,126,126,0.15);
      border: 1px solid rgba(196,126,126,0.4);
      border-radius: 10px;
      color: var(--red);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 12px;
    }
    .btn-cancel:hover:not(:disabled) {
      background: rgba(196,126,126,0.25);
      border-color: rgba(196,126,126,0.6);
    }
    .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-back {
      display: block;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px;
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--text); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .not-logged-in {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 16px 0;
    }
    .not-logged-in a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .plan-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .plan-badge.active  { background: rgba(126,200,160,0.15); color: var(--green); }
    .plan-badge.trial   { background: rgba(102,192,244,0.15); color: var(--accent); }
    .plan-badge.cancelled { background: rgba(196,126,126,0.15); color: var(--red); }
    .plan-badge.expired { background: rgba(143,152,160,0.15); color: var(--text-muted); }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="logo">RevsGaming</div>

  <div class="card">

    <div class="card-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <h1>Cancel Subscription</h1>
    <p class="subtitle">You will keep full access until your billing period ends. No refunds are issued for remaining time.</p>

    <!-- Dynamic content injected here -->
    <div id="content">
      <p class="loading-text">Loading your subscription…</p>
    </div>

  </div>

  <script>
    const SUPABASE_URL     = 'https://kyoyunuwfuujqdomdmlh.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5b3l1bnV3ZnV1anFkb21kbWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTY5MDksImV4cCI6MjA5NzE5MjkwOX0.AJfWxp7rcn9psHFZQpX9qmCw32rsYo9pYiIpxHfIX3I'

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    const content = document.getElementById('content')

    function fmt(iso) {
      if (!iso) return '—'
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    }

    function renderNotLoggedIn() {
      content.innerHTML = `
        <div class="not-logged-in">
          <p>You need to be signed in to manage your subscription.</p>
          <br>
          <a href="/register.html">Sign in to your account</a>
        </div>`
    }

    function renderNoSubscription() {
      content.innerHTML = `
        <div class="not-logged-in">
          <p>No active subscription found for this account.</p>
          <br>
          <a href="/upgrade.html">Get a plan</a>
        </div>`
    }

    function renderAlreadyCancelled(sub) {
      content.innerHTML = `
        <div class="info-box">
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value"><span class="plan-badge cancelled">Cancelled</span></span>
          </div>
          <div class="info-row">
            <span class="info-label">Access until</span>
            <span class="info-value">${fmt(sub.expires_at)}</span>
          </div>
        </div>
        <div class="not-logged-in" style="text-align:left;padding:0;">
          <p style="color:var(--text-muted);font-size:0.9rem;">Your subscription is already cancelled. You can still use RevsGaming until <strong>${fmt(sub.expires_at)}</strong>.</p>
        </div>
        <hr class="divider">
        <a href="/upgrade.html" class="btn-back">&#8592; Renew subscription</a>
        <a href="/" class="btn-back">Back to home</a>`
    }

    function renderCancel(sub, userEmail) {
      const planLabel = sub.plan === 'annual' ? 'Annual' : sub.plan === 'monthly' ? 'Monthly' : sub.plan
      const statusClass = sub.status === 'trial' ? 'trial' : 'active'

      content.innerHTML = `
        <div class="info-box" id="infoBox">
          <div class="info-row">
            <span class="info-label">Account</span>
            <span class="info-value" style="word-break:break-all;">${userEmail}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Plan</span>
            <span class="info-value">${planLabel} <span class="plan-badge ${statusClass}">${sub.status}</span></span>
          </div>
          <div class="info-row">
            <span class="info-label">Expires</span>
            <span class="info-value">${fmt(sub.expires_at)}</span>
          </div>
        </div>

        <div class="warning-box">
          After cancellation, your access continues until <strong>${fmt(sub.expires_at)}</strong>. After that date the app will be locked until you renew.
        </div>

        <div class="alert-error" id="errBox"></div>
        <div class="success-box" id="successBox"></div>

        <button class="btn-cancel" id="btnCancel">Cancel my subscription</button>
        <a href="/" class="btn-back">&#8592; Keep my subscription</a>`

      document.getElementById('btnCancel').addEventListener('click', async () => {
        const btn = document.getElementById('btnCancel')
        const errBox = document.getElementById('errBox')
        const successBox = document.getElementById('successBox')

        btn.disabled = true
        btn.textContent = 'Cancelling…'
        errBox.classList.remove('visible')

        const { data, error } = await sb.rpc('cancel_subscription', { p_user_id: sub.user_id })

        if (error || !data?.success) {
          errBox.textContent = error?.message || data?.error || 'Something went wrong. Please try again.'
          errBox.classList.add('visible')
          btn.disabled = false
          btn.textContent = 'Cancel my subscription'
          return
        }

        // Success
        btn.style.display = 'none'
        document.getElementById('infoBox').style.display = 'none'
        document.querySelector('.warning-box') && (document.querySelector('.warning-box').style.display = 'none')
        successBox.style.display = 'block'
        successBox.innerHTML = `<strong>Subscription cancelled.</strong><br>You still have full access until <strong>${fmt(data.expires_at || sub.expires_at)}</strong>. After that, you can renew anytime at <a href="/upgrade.html" style="color:var(--green);text-decoration:underline;">revsgaming.com/upgrade</a>.`
      })
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { renderNotLoggedIn(); return }

      const userId = session.user.id
      const userEmail = session.user.email

      const { data: sub, error } = await sb
        .from('subscriptions')
        .select('user_id, plan, status, starts_at, expires_at')
        .eq('user_id', userId)
        .single()

      if (error || !sub) { renderNoSubscription(); return }

      if (sub.status === 'cancelled' || sub.status === 'expired') {
        renderAlreadyCancelled(sub)
        return
      }

      renderCancel(sub, userEmail)
    }

    init()
  </script>
</body>
</html>
